<h2 mat-dialog-title align="center">
  {{ data.event.title }}
</h2>

<mat-dialog-content>

  @if(!showPayment){

    <mat-form-field appearance="outline">
      <mat-label>Team Name</mat-label>
      <input
        matInput
        [(ngModel)]="teamName">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Number Of Players</mat-label>
      <input
        matInput
        type="number"
        [(ngModel)]="numberOfPlayers">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Captain / Contact Person</mat-label>
      <input
        matInput
        [(ngModel)]="contactPerson">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mobile Number</mat-label>
      <input
        matInput
        maxlength="10"
        [(ngModel)]="mobile">
    </mat-form-field>

    <p>
      Registration Fee :
      <strong>₹{{ amount }}</strong>
    </p>

  }

  @else {

    <div align="center">

      <h3>
        Scan QR Code To Pay
      </h3>

      <qrcode
        [qrdata]="upiData"
        [width]="220">
      </qrcode>

      <p>
        Amount : ₹{{ amount }}
      </p>

    </div>

  }

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button
    mat-stroked-button
    (click)="cancel()">
    Cancel
  </button>

  @if(!showPayment){

    <button
      mat-raised-button
      color="primary"
      (click)="proceedToPay()">

      Proceed To Pay

    </button>

  } @else {

    <button
      mat-raised-button
      color="primary"
      (click)="paymentDone()">

      Payment Done

    </button>

  }

</mat-dialog-actions>
