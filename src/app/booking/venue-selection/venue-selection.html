<h2>Select Venue</h2>

<div class="grid">
  @for (venue of venues; track venue.id) {
    <div class="card"  (click)="selectVenue(venue)">
      <img [src]="venue.image" [alt]="venue.name">
      <h3>{{ venue.name }}</h3>
      <p>{{ venue.location }}</p>
      <span>₹{{ venue.price }}</span>
    </div>
  }
</div>
