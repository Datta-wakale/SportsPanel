<div class="bookings-container">

    <h1 class="title">

        Manage Bookings

    </h1>

    <table class="bookings-table">

        <thead>

            <tr>

                <th>Sport</th>

                <th>Venue</th>

                <th>Date</th>

                <th>Time</th>

                <th>Amount</th>

                <th>Status</th>

                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            @for (booking of bookings; track booking.id) {

            <tr>

                <td>{{booking.sportName}}</td>

                <td>{{booking.venueName}}</td>

                <td>{{booking.date}}</td>

                <td>

                    {{booking.fromTime}}

                    -

                    {{booking.toTime}}

                </td>

                <td>

                    ₹{{booking.amount}}

                </td>

                <td>

                    <span
                        class="status"
                        [class.upcoming]="booking.status === 'Upcoming'"
                        [class.completed]="booking.status === 'Completed'"
                        [class.cancelled]="booking.status === 'Cancelled'">

                        {{booking.status}}

                    </span>

                </td>

                <td>

                    <button
                        class="complete-btn"
                        (click)="completeBooking(booking.id)">

                        Complete

                    </button>

                    <button
                        class="cancel-btn"
                        (click)="cancelBooking(booking.id)">

                        Cancel

                    </button>

                </td>

            </tr>

            }

        </tbody>

    </table>

</div>
